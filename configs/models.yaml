media:
  source_dir: "E:/data/originals"
  image_max_side: 1344
  gif_sample_frames: 8
  gif_max_sample_frames: 12
  video_sample_fps: 1

vlm:
  provider: "ollama"
  model: "llava:13b"
  base_url: "http://127.0.0.1:11434"
  batch_size: 50
  max_batch_size: 100

llm:
  provider: "openai_compatible"
  model: "deepseek-v4-flash"
  api_key_env: "DEEPSEEK_API_KEY"
  base_url: "https://api.deepseek.com/v1"
  require_json: true
  temperature: 0.3
  max_tokens: 2048
  timeout_s: 120
  anthropic_version: "2023-06-01"

embedding:
  provider: "ollama"
  image_model: "llava:13b"
  text_model: "nomic-embed-text:latest"
  base_url: "http://127.0.0.1:11434"

scheduler:
  model_switch_wait: 10
  max_retries: 3

scoring:
  visual_similarity_weight: 0.50
  text_similarity_weight: 0.25
  emotional_match_weight: 0.15
  cluster_confidence_weight: 0.10
  high_match_threshold: 0.80
  review_threshold: 0.60

dedup:
  phash_hamming_threshold: 5

preference_memory:
  enabled: false
  base_score_weight: 0.50
  preference_score_weight: 0.50

adaptive:
  sample_interval: 10
  merge_gap: 15
  merge_score_threshold: 0.50
  worthiness_threshold: 0.50
  refine_threshold: 0.65
  refine_radius: 10
  refine_interval: 10
  max_duration: 10
  output_ratio: 0.45
  max_output: 40
  vlm_temperature: 0.50
  vlm_top_p: 0.90
  vlm_top_k: 40
  gif_fps: 24
  gif_max_width: 720
  clear_output_dir: true
  potplayer_pbf_enabled: true
  embedding_dedup_enabled: true
  embedding_dedup_threshold: 0.90
  temporal_dedup_enabled: true
  temporal_dedup_min_gap_s: 12

database:
  path: "data/library.db"

paths:
  frames_dir: "data/frames"
  thumbs_dir: "data/thumbs"
  faiss_dir: "data/faiss"
  exports_dir: "data/exports"
